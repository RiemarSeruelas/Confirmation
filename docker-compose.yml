services:
  power-tool:
    build: .
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      PORT: 5057
      QR_PAYLOAD_MODE: url
      TRUST_PROXY: "1"
    expose:
      - "5057"
    volumes:
      - power_tool_data:/app/server/data

  nginx:
    image: nginx:1.29-alpine
    restart: unless-stopped
    depends_on:
      power-tool:
        condition: service_healthy
    ports:
      - "5057:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  power_tool_data:
