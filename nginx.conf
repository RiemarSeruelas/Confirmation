worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65s;
    keepalive_requests 1000;

    client_max_body_size 30m;
    client_body_timeout 60s;
    client_header_timeout 15s;
    send_timeout 300s;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        "" close;
    }

    limit_req_zone $binary_remote_addr zone=confirmation_api:10m rate=30r/s;

    upstream confirmation_backend {
        zone confirmation_backend 64k;
        server confirmation:5178 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    server {
        listen 80;
        listen [::]:80;

        location = /health {
            access_log off;
            proxy_pass http://confirmation_backend/api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        location /api/ {
            limit_req zone=confirmation_api burst=60 nodelay;

            proxy_pass http://confirmation_backend;
            proxy_cache_bypass 1;
            proxy_no_cache 1;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
            add_header Expires "0" always;

            proxy_connect_timeout 10s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;

            proxy_request_buffering on;
            proxy_buffering on;
            proxy_buffer_size 16k;
            proxy_buffers 16 16k;
        }

        location / {
            proxy_pass http://confirmation_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
    }
}
